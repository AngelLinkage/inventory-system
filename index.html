<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linkage Fire Inventory</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://static.mywebsites360.com/fafa4aabcb704266ab8fdca592e6b118/i/d02ba4221db84af1ad34fa4e1420c4a0/9/4SoifmQp45JMgBnHdjjec/Fire-Alarm-Installation.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader { border-top-color: #dc2626; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Search dropdown styles */
        #searchDropdown {
            max-height: 260px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        #searchDropdown::-webkit-scrollbar { width: 4px; }
        #searchDropdown::-webkit-scrollbar-track { background: transparent; }
        #searchDropdown::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }

        .dropdown-item {
            cursor: pointer;
            transition: background 0.15s;
        }
        .dropdown-item:hover, .dropdown-item.highlighted {
            background-color: #fef2f2;
        }
        .match-highlight {
            background-color: #fecaca;
            border-radius: 2px;
            font-weight: 700;
        }

        /* Auto-refresh styles */
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        @keyframes spin-refresh {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .refreshing-dot {
            animation: pulse-dot 0.8s ease-in-out infinite !important;
            background-color: #f59e0b !important;
            box-shadow: 0 0 5px #f59e0b !important;
        }
        .stock-updated {
            animation: flash-green 0.6s ease-out;
        }
        @keyframes flash-green {
            0% { background-color: #dcfce7; }
            100% { background-color: #f1f5f9; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 pb-10">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://static.mywebsites360.com/fafa4aabcb704266ab8fdca592e6b118/i/c62c06c2bbe846d2a49a67e52a23a4a6/9/5feFb8zhrk/Logo-Grey.png" 
                     alt="Linkage Logo" class="h-10 w-auto object-contain">
                <div class="h-8 w-[1px] bg-slate-700"></div>
                <div class="flex flex-col">
                    <h1 class="text-xs uppercase tracking-[0.3em] text-red-500 font-black">Inventory</h1>
                    <span class="text-[9px] uppercase tracking-[0.1em] text-slate-400 font-medium">Control System</span>
                </div>
            </div>
            <div id="status-indicator" class="flex items-center gap-1 text-[9px] text-gray-400 font-bold tracking-widest">
                <span id="status-dot" class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_5px_#22c55e]"></span>
                <span id="status-text">LIVE</span>
            </div>
            <div id="last-sync" class="text-[8px] text-slate-500 tracking-wide hidden">synced <span id="sync-time">--</span></div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-5 space-y-6">
        <div class="text-center py-4">
            <h2 class="text-2xl font-bold text-slate-800">Inventory Sync</h2>
            <p class="text-gray-500 text-sm">Register equipment movement</p>
        </div>

        <div class="glass-card rounded-3xl shadow-2xl p-6 border border-white">
            <form id="inventoryForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Technician</label>
                    <input type="text" id="technician" required placeholder="Full Name" 
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none shadow-sm">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Job Name / Address</label>
                    <input type="text" id="jobName" required placeholder="Client or Project" 
                        class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none shadow-sm">
                </div>

                <!-- ─── SMART SEARCH FIELD (replaces plain <select>) ─── -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Search Device / Part #</label>

                    <!-- Hidden input that stores the selected partNumber value for form submission -->
                    <input type="hidden" id="partNumber" required>

                    <div class="relative">
                        <!-- Search input -->
                        <input
                            type="text"
                            id="partSearch"
                            autocomplete="off"
                            placeholder="Type part # or description keyword…"
                            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none shadow-sm pr-10"
                        >
                        <!-- Clear button -->
                        <button type="button" id="clearSearch"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-red-500 hidden text-xl leading-none"
                            tabindex="-1">✕</button>

                        <!-- Dropdown results -->
                        <div id="searchDropdown"
                            class="hidden absolute z-40 w-full mt-2 bg-white border border-gray-200 rounded-2xl shadow-2xl overflow-hidden">
                            <div id="dropdownList" class="divide-y divide-gray-100"></div>
                            <div id="noResults" class="hidden p-4 text-center text-sm text-slate-400">No parts found</div>
                        </div>
                    </div>

                    <!-- Selected part pill -->
                    <div id="selectedPill" class="hidden mt-3 flex items-center gap-2 px-3 py-2 bg-slate-800 text-white rounded-xl text-xs font-semibold">
                        <span id="selectedPillText" class="flex-1 truncate"></span>
                        <button type="button" id="clearPill" class="text-slate-400 hover:text-red-400 text-base leading-none flex-shrink-0">✕</button>
                    </div>

                    <!-- Stock badge -->
                    <div id="stockDisplay" class="mt-3 inline-flex items-center px-3 py-1 rounded-full bg-slate-100 text-xs font-bold text-slate-600">
                        In Stock: <span id="stockValue" class="ml-1 text-slate-900">--</span>
                    </div>
                </div>
                <!-- ─── END SMART SEARCH ─── -->

                <hr class="border-gray-100">

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Action</label>
                        <select id="action" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none font-semibold appearance-none">
                            <option value="OUT">Check-Out</option>
                            <option value="IN">Check-In</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Quantity</label>
                        <input type="number" id="quantity" required min="1" value="1" 
                            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none text-center font-bold text-lg shadow-sm">
                    </div>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full bg-slate-900 hover:bg-red-600 text-white font-bold py-5 rounded-2xl shadow-xl transition-all active:scale-95 flex justify-center items-center gap-2">
                    <span>SUBMIT ENTRY</span>
                </button>
            </form>
            <div id="successMsg" class="hidden mt-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-2xl text-center font-bold animate-bounce">
                Saved Successfully! ✓
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySc9h2_s-WPCRhoUeX8jqU_X7Ic8gvOuxgQkzjRjsqlAEpZxdUzz-aizshxKFjRf5gyQ/exec';
        let inventoryData = [];

        /* ── helpers ─────────────────────────────────────── */
        function escapeHtml(str) {
            return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        function highlightMatch(text, query) {
            if (!query) return escapeHtml(text);
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escapeHtml(text).replace(regex, '<mark class="match-highlight">$1</mark>');
        }

        /* ── search / dropdown logic ─────────────────────── */
        const searchInput   = document.getElementById('partSearch');
        const dropdown      = document.getElementById('searchDropdown');
        const dropdownList  = document.getElementById('dropdownList');
        const noResults     = document.getElementById('noResults');
        const clearBtn      = document.getElementById('clearSearch');
        const partHidden    = document.getElementById('partNumber');
        const selectedPill  = document.getElementById('selectedPill');
        const selectedPillText = document.getElementById('selectedPillText');
        const clearPill     = document.getElementById('clearPill');

        function showDropdown(query) {
            const q = query.trim().toLowerCase();
            dropdownList.innerHTML = '';
            noResults.classList.add('hidden');

            if (!q) { dropdown.classList.add('hidden'); return; }

            // Filter: match in partNumber (col C) OR description (col D)
            const matches = inventoryData.filter(item =>
                item.partNumber.toLowerCase().includes(q) ||
                item.description.toLowerCase().includes(q)
            ).slice(0, 40); // cap results for performance

            if (matches.length === 0) {
                noResults.classList.remove('hidden');
                dropdown.classList.remove('hidden');
                return;
            }

            matches.forEach(item => {
                const div = document.createElement('div');
                div.className = 'dropdown-item px-4 py-3';
                div.innerHTML = `
                    <div class="text-xs font-bold text-red-600 tracking-wide">${highlightMatch(item.partNumber, query.trim())}</div>
                    <div class="text-xs text-slate-600 mt-0.5 leading-snug">${highlightMatch(item.brand, query.trim())} — ${highlightMatch(item.description, query.trim())}</div>
                `;
                div.addEventListener('mousedown', (e) => {
                    e.preventDefault(); // prevent blur before click
                    selectItem(item);
                });
                dropdownList.appendChild(div);
            });

            dropdown.classList.remove('hidden');
        }

        function selectItem(item) {
            partHidden.value = item.partNumber;
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            dropdown.classList.add('hidden');

            // Show selected pill
            selectedPillText.textContent = `${item.partNumber} — ${item.description}`;
            selectedPill.classList.remove('hidden');
            selectedPill.classList.add('flex');

            // Update stock
            const val = document.getElementById('stockValue');
            val.textContent = item.currentStock;
            val.className = item.currentStock < 5
                ? "ml-1 text-red-600 font-black"
                : "ml-1 text-green-600 font-black";
        }

        function clearSelection() {
            partHidden.value = '';
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            dropdown.classList.add('hidden');
            selectedPill.classList.add('hidden');
            selectedPill.classList.remove('flex');
            document.getElementById('stockValue').textContent = '--';
            document.getElementById('stockValue').className = 'ml-1 text-slate-900';
        }

        searchInput.addEventListener('input', () => {
            const q = searchInput.value;
            clearBtn.classList.toggle('hidden', !q);
            // Clear any previous selection when user types again
            if (partHidden.value) {
                partHidden.value = '';
                selectedPill.classList.add('hidden');
                selectedPill.classList.remove('flex');
            }
            showDropdown(q);
        });

        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim()) showDropdown(searchInput.value);
        });

        searchInput.addEventListener('blur', () => {
            setTimeout(() => dropdown.classList.add('hidden'), 150);
        });

        clearBtn.addEventListener('click', clearSelection);
        clearPill.addEventListener('click', () => { clearSelection(); searchInput.focus(); });

        /* ── init: load inventory ────────────────────────── */
        const REFRESH_INTERVAL = 30000; // 30 seconds
        let refreshTimer = null;

        async function fetchInventory(isRefresh = false) {
            const dot  = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const lastSync = document.getElementById('last-sync');
            const syncTime = document.getElementById('sync-time');

            // Show refreshing state
            dot.classList.add('refreshing-dot');
            if (isRefresh) text.textContent = 'SYNCING';

            try {
                const response = await fetch(SCRIPT_URL + '?t=' + Date.now()); // cache-bust
                const freshData = await response.json();

                // If a part is currently selected, check if its stock changed
                const selectedPart = partHidden.value;
                if (selectedPart) {
                    const oldItem = inventoryData.find(i => i.partNumber === selectedPart);
                    const newItem = freshData.find(i => i.partNumber === selectedPart);
                    if (oldItem && newItem && oldItem.currentStock !== newItem.currentStock) {
                        // Flash the stock badge to signal it changed
                        const stockBadge = document.getElementById('stockDisplay');
                        stockBadge.classList.add('stock-updated');
                        setTimeout(() => stockBadge.classList.remove('stock-updated'), 700);

                        // Update displayed stock value
                        const val = document.getElementById('stockValue');
                        val.textContent = newItem.currentStock;
                        val.className = newItem.currentStock < 5
                            ? "ml-1 text-red-600 font-black"
                            : "ml-1 text-green-600 font-black";
                    }
                }

                inventoryData = freshData;

                // Success state
                dot.classList.remove('refreshing-dot');
                dot.style.backgroundColor = '#22c55e';
                dot.style.boxShadow = '0 0 5px #22c55e';
                text.textContent = 'LIVE';

                // Show last sync time
                const now = new Date();
                const h = now.getHours().toString().padStart(2,'0');
                const m = now.getMinutes().toString().padStart(2,'0');
                const s = now.getSeconds().toString().padStart(2,'0');
                syncTime.textContent = `${h}:${m}:${s}`;
                lastSync.classList.remove('hidden');

            } catch {
                dot.classList.remove('refreshing-dot');
                dot.style.backgroundColor = '#ef4444';
                dot.style.boxShadow = 'none';
                text.textContent = 'OFFLINE';
                lastSync.classList.add('hidden');
            }
        }

        window.onload = async () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            }

            // Initial load
            await fetchInventory(false);

            // Start auto-refresh every 30s
            refreshTimer = setInterval(() => fetchInventory(true), REFRESH_INTERVAL);

            // Pause refresh when tab is hidden, resume when visible
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    clearInterval(refreshTimer);
                } else {
                    fetchInventory(true); // immediate refresh on tab focus
                    refreshTimer = setInterval(() => fetchInventory(true), REFRESH_INTERVAL);
                }
            });
        };

        /* ── form submit ─────────────────────────────────── */
        document.getElementById('inventoryForm').onsubmit = async (e) => {
            e.preventDefault();

            if (!partHidden.value) {
                searchInput.focus();
                searchInput.classList.add('ring-2', 'ring-red-500');
                setTimeout(() => searchInput.classList.remove('ring-2', 'ring-red-500'), 1500);
                return;
            }

            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('successMsg');
            btn.disabled = true;
            btn.innerHTML = 'Sending...';

            const payload = {
                technician: document.getElementById('technician').value,
                jobName:    document.getElementById('jobName').value,
                partNumber: partHidden.value,
                action:     document.getElementById('action').value,
                quantity:   document.getElementById('quantity').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                msg.classList.remove('hidden');
                document.getElementById('inventoryForm').reset();
                clearSelection();
                setTimeout(() => { msg.classList.add('hidden'); location.reload(); }, 3000);
            } catch {
                alert('Error connecting to Sheets');
                btn.disabled = false;
                btn.innerHTML = 'SUBMIT ENTRY';
            }
        };
    </script>
</body>
</html>
